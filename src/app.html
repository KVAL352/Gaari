<!doctype html>
<html lang="nb">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" sizes="32x32" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="max-image-preview:large" />
		<link rel="preload" href="/fonts/inter-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/barlow-condensed-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
		<meta name="google-site-verification" content="Cqs06hSFIvk6n3dPkQ9305hVW_CCQ3Y6mbN8Gun9-Qw" />
	<!-- Privacy-friendly analytics by Umami -->
		<script defer src="/u/script.js" data-website-id="5f889214-285b-4412-8066-015a18f8ce65" data-host-url="/u"></script>
		<!-- AI referral tracking: fires custom event when visitor arrives from an AI search platform -->
		<script>window.addEventListener('load',function(){var s=null;var r=document.referrer;var d=['chatgpt.com','chat.openai.com','perplexity.ai','claude.ai','gemini.google.com','copilot.microsoft.com','deepseek.com','you.com','phind.com','meta.ai'];for(var i=0;i<d.length;i++){if(r&&r.indexOf(d[i])!==-1){s=d[i];break;}}if(!s){var m=document.cookie.match(/ai_ref=([^;]+)/);if(m)s=m[1];}if(s&&window.umami){umami.track('ai-referral',{source:s});document.cookie='ai_ref=;Max-Age=0;Path=/';}})</script>
		<!-- UTM attribution: parse utm_source/medium/campaign from URL and fire as custom event -->
		<script>window.addEventListener('load',function(){if(!window.umami)return;var p=new URLSearchParams(window.location.search);var s=p.get('utm_source');if(s){umami.track('utm-visit',{source:s,medium:p.get('utm_medium')||'',campaign:p.get('utm_campaign')||''});}})</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
