<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Morning terminal mockup</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #F5F3EE;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    overflow: hidden;
  }
  .terminal {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 92%;
    background: #1C1C1E;
    box-shadow: 0 12px 36px rgba(28,28,30,0.35);
    border-radius: 6px;
    overflow: hidden;
  }
  .titlebar {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    background: #2A2A2C;
    border-bottom: 1px solid #3A3A3C;
  }
  .dot { width: 13px; height: 13px; border-radius: 50%; margin-right: 8px; }
  .dot.r { background: #ff5f56; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #27c93f; }
  .titlebar .label {
    margin-left: auto;
    color: #9a9a9a;
    font-size: 14px;
    letter-spacing: 0.06em;
  }
  .content {
    padding: 28px 32px 36px 32px;
    color: #F5F3EE;
    font-size: 26px;
    line-height: 1.5;
    min-height: 480px;
  }
  .prompt-symbol { color: #E8A838; }
  .prompt-text { color: #F5F3EE; opacity: 0.92; }
  .step { color: #C82D2D; }
  .check { color: #27c93f; }
  .dim { opacity: 0.6; }
  .note { color: #9bd3ff; }
  .line { opacity: 0; transform: translateY(4px); transition: opacity .12s ease-out, transform .12s ease-out; }
  .line.show { opacity: 1; transform: translateY(0); }
  .cursor {
    display: inline-block;
    width: 9px; height: 19px;
    background: #F5F3EE;
    margin-left: 4px;
    vertical-align: text-bottom;
    animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="terminal">
  <div class="titlebar">
    <span class="dot r"></span>
    <span class="dot y"></span>
    <span class="dot g"></span>
    <span class="label">claude · morgenrutine</span>
  </div>
  <div class="content">
    <div class="line" data-delay="500"><span class="prompt-symbol">$</span> claude</div>
    <div class="line" data-delay="1500"><span class="dim">&gt;</span> <span class="prompt-text">les morgenens digest, hva m&aring; jeg gj&oslash;re i dag?</span></div>
    <div class="line" data-delay="2700"><span class="step">&#9679;</span> henter epost fra 07:00 &hellip;</div>
    <div class="line" data-delay="3800"><span class="step">&#9679;</span> <span class="note">3 nye henvendelser</span> fra arrang&oslash;rer</div>
    <div class="line" data-delay="4900"><span class="step">&#9679;</span> scraper <span class="note">bymuseet</span> &mdash; <span class="dim">-60%</span> treff siste d&oslash;gn</div>
    <div class="line" data-delay="6000"><span class="step">&#9679;</span> <span class="note">+12 nye s&oslash;k</span>: &quot;konserter bergen&quot;</div>
    <div class="line" data-delay="7100"><span class="check">&#10003;</span> tre prioriteringer for i dag<span class="cursor"></span></div>
  </div>
</div>

<script>
  const lines = document.querySelectorAll('.line');
  lines.forEach(l => l.classList.add('show'));
  setTimeout(() => {
    function play() {
      lines.forEach(l => l.classList.remove('show'));
      lines.forEach(l => {
        const delay = parseInt(l.dataset.delay, 10);
        setTimeout(() => l.classList.add('show'), delay);
      });
    }
    play();
    setInterval(play, 11000);
  }, 3000);
</script>

</body>
</html>
