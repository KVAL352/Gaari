# Security-only configuration — solo project, version updates handled manually.
# See memory/project_vercel_dependabot_cleanup.md for context.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /scripts
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - scrapers

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    labels:
      - ci
