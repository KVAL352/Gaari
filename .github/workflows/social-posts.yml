name: Generate & Post Social Content

on:
  schedule:
    # FB at 07:00 UTC (08:00 CET)
    - cron: '0 7 * * *'
    # IG carousel at 14:00 UTC (16:00 CEST)
    - cron: '0 14 * * *'
    # Stories staggered every 2 hours: 13, 15, 17, 19 UTC (15, 17, 19, 21 CEST)
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to post to (all, ig, fb)'
        required: false
        default: 'all'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci
        timeout-minutes: 2

      - name: Determine platform
        id: platform
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.platform || 'all' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 * * *" ]; then
            echo "target=fb" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            echo "target=ig" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 13 * * *" ] || [ "${{ github.event.schedule }}" = "0 15 * * *" ] || [ "${{ github.event.schedule }}" = "0 17 * * *" ] || [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
            echo "target=stories" >> "$GITHUB_OUTPUT"
          else
            echo "target=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate social posts
        if: steps.platform.outputs.target != 'stories'
        id: generate
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUMMARY_FILE: ${{ runner.temp }}/social-summary.json
        run: npx tsx social/generate-posts.ts

      - name: Post to social platforms
        if: success()
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: npx tsx social/post-to-socials.ts --platform=${{ steps.platform.outputs.target }}

      - name: Fetch social insights
        if: always() && steps.platform.outputs.target != 'stories'
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: npx tsx social/fetch-social-insights.ts

      - name: Generate job summary
        if: always()
        run: |
          SUMMARY_FILE="${{ runner.temp }}/social-summary.json"
          PLATFORM="${{ steps.platform.outputs.target }}"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "## Social Posts Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> No summary file found — script may have crashed before completion." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          DATE=$(jq -r '.date' "$SUMMARY_FILE")
          SCHEDULED=$(jq '.collectionsScheduled' "$SUMMARY_FILE")
          GENERATED=$(jq '.collectionsGenerated' "$SUMMARY_FILE")
          FAILED=$(jq '.collectionsFailed' "$SUMMARY_FILE")
          DURATION=$(jq '.durationSeconds' "$SUMMARY_FILE")

          if [ "$FAILED" -gt 0 ]; then
            STATUS="partial"
          elif [ "$GENERATED" -eq 0 ]; then
            STATUS="skipped"
          else
            STATUS="healthy"
          fi

          echo "## Social Posts Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | **${STATUS}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | ${PLATFORM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Date | ${DATE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Collections scheduled | ${SCHEDULED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Collections generated | ${GENERATED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Collections failed | ${FAILED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | ${DURATION}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # List per-collection results
          echo "### Per-collection results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Collection | Events | Slides | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.results | to_entries[] | "| \(.key) | \(.value.eventCount) | \(.value.slideCount) | \(if .value.success then "ok" else "FAILED" end) |"' "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
