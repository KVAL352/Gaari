name: Send Weekly Newsletter

on:
  schedule:
    # Every Thursday at 10:00 UTC (11:00 CET / 12:00 CEST)
    - cron: '0 10 * * 4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate HTML preview, do not send)'
        required: false
        default: 'false'
        type: boolean

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci
        timeout-minutes: 2

      - name: Send newsletter
        id: send
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          NEWSLETTER_SIGNING_SECRET: ${{ secrets.NEWSLETTER_SIGNING_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUMMARY_FILE: ${{ runner.temp }}/newsletter-summary.json
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          npx tsx send-newsletter.ts $FLAGS

      - name: Generate job summary
        if: always()
        run: |
          SUMMARY_FILE="${{ runner.temp }}/newsletter-summary.json"
          echo "## Newsletter Summary" >> "$GITHUB_STEP_SUMMARY"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "> No summary file — script may have crashed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
