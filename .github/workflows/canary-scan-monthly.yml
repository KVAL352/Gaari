name: Canary Scan (monthly)

# Runs once a month against scripts/canary-targets.txt to detect if any
# competitor has copied Gåri's database. A canary "hit" means one of our
# synthetic events (planted via canary-manage.ts) appeared on a target URL —
# udiskutabelt bevis på kopiering.
#
# Outcome:
#  - 0 hits → workflow passes silently
#  - ≥1 hit → workflow fails, evidence uploaded as artifact, GitHub emails admin
#
# Manual run: Actions tab → "Canary Scan (monthly)" → "Run workflow"

on:
  schedule:
    # 1st of every month at 07:00 UTC (08:00 CET / 09:00 CEST), one hour
    # before daily-digest so the digest can pick up canary news if needed.
    - cron: '0 7 1 * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install scraper dependencies
        working-directory: scripts
        run: npm ci
        timeout-minutes: 2

      - name: Run canary scan
        id: scan
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx canary-scan.ts --file canary-targets.txt

      - name: Upload evidence on hit
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: canary-evidence-${{ github.run_id }}
          path: outputs/canary-evidence/
          # 365 days — legal cases take time to develop. Local copy in
          # the repo's outputs/ folder is the long-term archive.
          retention-days: 365

      - name: Job summary
        if: always()
        run: |
          STATUS="✅ No hits"
          if [ "${{ steps.scan.outcome }}" = "failure" ]; then
            STATUS="🚨 CANARY HIT — evidence uploaded as artifact"
          fi
          echo "## Canary Scan — $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See workflow logs for per-target results." >> "$GITHUB_STEP_SUMMARY"
