name: Weekly Reel Batch

on:
  schedule:
    # Sunday 18:00 UTC (20:00 CEST) — generate Mon–Sat batch for the upcoming week.
    # generate-week.ts auto-targets the next Monday from the run time.
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      start:
        description: 'Explicit start date (YYYY-MM-DD, must be a Monday). Leave empty for next Monday.'
        required: false
        default: ''

jobs:
  generate-week:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install dependencies
        working-directory: scripts
        run: npm ci
        timeout-minutes: 3

      - name: Generate weekly reel batch and email delivery
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "${{ inputs.start }}" ]; then
            npx tsx social/generate-week.ts --start=${{ inputs.start }} --email
          else
            npx tsx social/generate-week.ts --email
          fi
