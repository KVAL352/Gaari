name: Weekly Reel Batch

on:
  schedule:
    # Sunday 18:00 UTC (20:00 CEST) — generate Mon–Sat batch for the upcoming week.
    # generate-week.ts auto-targets the next Monday from the run time.
    - cron: '0 18 * * 0'
    # Thursday 15:00 UTC — re-assemble with fresh content from daily GHA jobs.
    # By Thursday the first 4 days (Mon–Thu) have been generated by social-posts.yml.
    - cron: '0 15 * * 4'
  workflow_dispatch:
    inputs:
      start:
        description: 'Explicit start date (YYYY-MM-DD, must be a Monday). Leave empty for next Monday.'
        required: false
        default: ''
      assemble_only:
        description: 'Only assemble from existing storage (skip generate-week.ts)'
        required: false
        default: 'false'

jobs:
  generate-week:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install ffmpeg
        if: inputs.assemble_only != 'true' && github.event.schedule != '0 15 * * 4'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install dependencies
        working-directory: scripts
        run: npm ci
        timeout-minutes: 3

      - name: Compute start date
        id: dates
        run: |
          if [ -n "${{ inputs.start }}" ]; then
            echo "start=${{ inputs.start }}" >> "$GITHUB_OUTPUT"
          else
            # Next Monday (or current Monday if today is Mon–Sat)
            DOW=$(date -u +%u)
            if [ "$DOW" -eq 7 ]; then
              DAYS=1
            else
              DAYS=$((8 - DOW))
              # If Thu cron, use current week's Monday (go back)
              if [ "${{ github.event.schedule }}" = "0 15 * * 4" ]; then
                DAYS=$(( -(DOW - 1) ))
              fi
            fi
            START=$(date -u -d "+${DAYS} days" +%Y-%m-%d)
            echo "start=${START}" >> "$GITHUB_OUTPUT"
          fi

      # Full generation (Sunday cron + manual without assemble_only)
      - name: Generate weekly reel batch
        if: inputs.assemble_only != 'true' && github.event.schedule != '0 15 * * 4'
        id: generate
        working-directory: scripts
        continue-on-error: true
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npx tsx social/generate-week.ts --start=${{ steps.dates.outputs.start }} --email

      # Always assemble from storage (creates per-day ZIPs + manifest)
      - name: Assemble week from storage
        working-directory: scripts
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx social/assemble-week.ts --start=${{ steps.dates.outputs.start }}
